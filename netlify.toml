# Netlify build config for APN Hub (Next.js App Router).
# The official Next.js runtime plugin handles SSR, API routes, and middleware
# as serverless/edge functions — no static export needed.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
